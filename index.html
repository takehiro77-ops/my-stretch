<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイストレッチ動画</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    margin: 0;
    padding: 16px;
    min-height: 100vh;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 8px 0 16px; }
  .hint { color: #888; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }

  /* Buttons */
  button {
    background: #2a2a2a;
    color: #fff;
    border: 1px solid #444;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    margin: 4px;
  }
  button:hover { background: #3a3a3a; }
  button.primary { background: #d32f2f; border-color: #d32f2f; }
  button.primary:hover { background: #b71c1c; }
  button.success { background: #2e7d32; border-color: #2e7d32; }
  .toolbar { margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 4px; }

  /* Clip cards */
  .clip-item {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    padding: 14px;
    margin: 10px 0;
    border-radius: 8px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .clip-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .clip-index {
    background: #d32f2f;
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    flex-shrink: 0;
  }
  input {
    background: #0a0a0a;
    color: #fff;
    border: 1px solid #333;
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 14px;
    flex: 1;
    min-width: 100px;
  }
  input:focus { outline: none; border-color: #d32f2f; }
  .time-input { max-width: 90px; flex: 0 0 auto; }
  .icon-btn {
    padding: 6px 10px;
    font-size: 14px;
    background: transparent;
    border: 1px solid #444;
  }

  /* Play mode */
  #playMode { display: none; }
  .player-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #000;
    margin-bottom: 16px;
  }
  #player {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }
  .now-playing {
    background: #1a1a1a;
    padding: 14px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 16px;
  }
  .now-playing .num { color: #d32f2f; font-weight: bold; margin-right: 8px; }
  .play-controls {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .play-controls button {
    font-size: 18px;
    padding: 14px 20px;
    min-width: 80px;
  }

  /* TV-friendly large mode */
  @media (min-width: 900px) {
    body { padding: 32px; }
    h1 { font-size: 28px; }
    .now-playing { font-size: 22px; padding: 20px; }
    .play-controls button { font-size: 22px; padding: 18px 28px; min-width: 110px; }
  }

  .label { font-size: 12px; color: #888; margin-right: 4px; }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #666;
    border: 2px dashed #333;
    border-radius: 8px;
    margin: 20px 0;
  }
</style>
</head>
<body>
<div class="container">

  <!-- EDIT MODE -->
  <div id="editMode">
    <h1>🧘 マイストレッチ動画</h1>
    <div class="hint">
      YouTubeのURL・開始時刻・終了時刻を入れて「再生開始」を押すと、指定区間だけを順番に連続再生します。<br>
      編集内容はURLに自動保存されるので、編集後のURLをFire TVのブラウザでブックマークすれば同じ内容が再現できます。
    </div>

    <div class="toolbar">
      <button class="primary" onclick="startPlaying()">▶ 再生開始</button>
      <button onclick="addClip()">+ クリップを追加</button>
      <button onclick="copyShareUrl()">📋 URLをコピー</button>
    </div>

    <div id="clipList"></div>
  </div>

  <!-- PLAY MODE -->
  <div id="playMode">
    <div class="now-playing">
      <span class="num" id="clipNum"></span>
      <span id="clipTitle"></span>
    </div>
    <div class="player-wrapper">
      <div id="player"></div>
    </div>
    <div class="play-controls">
      <button onclick="previousClip()">⏮ 前</button>
      <button onclick="togglePause()" id="pauseBtn">⏸ 一時停止</button>
      <button onclick="nextClip()">⏭ 次</button>
      <button onclick="exitPlaying()">編集に戻る</button>
    </div>
  </div>

</div>

<script>
  let clips = [];
  let currentIndex = 0;
  let player = null;
  let checkInterval = null;
  let ytReady = false;
  let pendingPlay = false;

  // --- YouTube API ---
  window.onYouTubeIframeAPIReady = function() {
    ytReady = true;
    if (pendingPlay) {
      pendingPlay = false;
      loadCurrentClip();
    }
  };
  (function() {
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  })();

  // --- URL helpers ---
  function parseYouTubeUrl(url) {
    if (!url) return { videoId: null, startTime: null };
    const idMatch = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
    const videoId = idMatch ? idMatch[1] : null;
    const tMatch = url.match(/[?&]t=(\d+)/);
    const startTime = tMatch ? parseInt(tMatch[1]) : null;
    return { videoId, startTime };
  }

  function formatTime(s) {
    if (s == null || isNaN(s)) return '';
    s = Math.max(0, Math.floor(s));
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function parseTime(str) {
    if (!str) return 0;
    str = str.toString().trim();
    if (str.includes(':')) {
      const parts = str.split(':').map(s => parseInt(s) || 0);
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
    }
    return parseInt(str) || 0;
  }

  // --- State persistence (URL hash) ---
  function loadFromHash() {
    if (location.hash.startsWith('#d=')) {
      try {
        const json = decodeURIComponent(escape(atob(location.hash.substring(3))));
        const data = JSON.parse(json);
        clips = data.clips || [];
      } catch(e) { console.warn('Failed to load:', e); }
    }
    if (clips.length === 0) {
      clips = [
        { title: '例: 朝のストレッチ', url: '', start: 0, end: 60 }
      ];
    }
  }

  function saveToHash() {
    try {
      const json = JSON.stringify({ clips });
      const encoded = btoa(unescape(encodeURIComponent(json)));
      history.replaceState(null, '', '#d=' + encoded);
    } catch(e) { console.warn('Save failed:', e); }
  }

  // --- Clip management ---
  function addClip() {
    clips.push({ title: '', url: '', start: 0, end: 60 });
    saveToHash();
    renderClips();
  }

  function deleteClip(i) {
    if (!confirm('このクリップを削除しますか？')) return;
    clips.splice(i, 1);
    saveToHash();
    renderClips();
  }

  function moveClip(i, dir) {
    const j = i + dir;
    if (j < 0 || j >= clips.length) return;
    [clips[i], clips[j]] = [clips[j], clips[i]];
    saveToHash();
    renderClips();
  }

  function updateClip(i, field, value) {
    if (field === 'url') {
      clips[i].url = value;
      const { startTime } = parseYouTubeUrl(value);
      if (startTime != null && (!clips[i].start || clips[i].start === 0)) {
        clips[i].start = startTime;
        renderClips();
      }
    } else if (field === 'title') {
      clips[i].title = value;
    } else if (field === 'start' || field === 'end') {
      clips[i][field] = parseTime(value);
    }
    saveToHash();
  }

  function renderClips() {
    const list = document.getElementById('clipList');
    list.innerHTML = '';
    if (clips.length === 0) {
      list.innerHTML = '<div class="empty-state">「クリップを追加」を押して始めましょう</div>';
      return;
    }
    clips.forEach((clip, i) => {
      const div = document.createElement('div');
      div.className = 'clip-item';
      div.innerHTML = `
        <div class="clip-row">
          <div class="clip-index">${i + 1}</div>
          <input placeholder="タイトル（例: 首のストレッチ）" value="${escapeHtml(clip.title || '')}"
                 onchange="updateClip(${i}, 'title', this.value)">
          <button class="icon-btn" onclick="moveClip(${i}, -1)" title="上へ">↑</button>
          <button class="icon-btn" onclick="moveClip(${i}, 1)" title="下へ">↓</button>
          <button class="icon-btn" onclick="deleteClip(${i})" title="削除">🗑</button>
        </div>
        <div class="clip-row">
          <input placeholder="YouTube URL を貼り付け" value="${escapeHtml(clip.url || '')}"
                 onchange="updateClip(${i}, 'url', this.value)">
        </div>
        <div class="clip-row">
          <span class="label">開始</span>
          <input class="time-input" placeholder="0:00" value="${formatTime(clip.start)}"
                 onchange="updateClip(${i}, 'start', this.value)">
          <span class="label">終了</span>
          <input class="time-input" placeholder="1:00" value="${formatTime(clip.end)}"
                 onchange="updateClip(${i}, 'end', this.value)">
          <span class="label" style="margin-left:auto">${formatTime(Math.max(0, (clip.end||0) - (clip.start||0)))}</span>
        </div>
      `;
      list.appendChild(div);
    });
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // --- Playback ---
  function startPlaying() {
    const valid = clips.filter(c => parseYouTubeUrl(c.url).videoId);
    if (valid.length === 0) {
      alert('有効なYouTube URLが入ったクリップがありません');
      return;
    }
    document.getElementById('editMode').style.display = 'none';
    document.getElementById('playMode').style.display = 'block';
    currentIndex = 0;
    // Skip clips without valid URL
    while (currentIndex < clips.length && !parseYouTubeUrl(clips[currentIndex].url).videoId) {
      currentIndex++;
    }
    if (ytReady) {
      loadCurrentClip();
    } else {
      pendingPlay = true;
    }
  }

  function loadCurrentClip() {
    const clip = clips[currentIndex];
    const { videoId } = parseYouTubeUrl(clip.url);
    if (!videoId) { nextClip(); return; }

    document.getElementById('clipNum').textContent = `${currentIndex + 1}/${clips.length}`;
    document.getElementById('clipTitle').textContent = clip.title || '(無題)';

    const startSec = clip.start || 0;
    const endSec = clip.end || (startSec + 60);

    if (player && player.loadVideoById) {
      player.loadVideoById({
        videoId: videoId,
        startSeconds: startSec,
        endSeconds: endSec
      });
    } else {
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: videoId,
        playerVars: {
          start: startSec,
          end: endSec,
          autoplay: 1,
          controls: 1,
          rel: 0,
          modestbranding: 1,
          playsinline: 1
        },
        events: {
          onReady: e => e.target.playVideo(),
          onStateChange: onPlayerStateChange
        }
      });
    }

    if (checkInterval) clearInterval(checkInterval);
    checkInterval = setInterval(checkClipEnd, 500);
  }

  function checkClipEnd() {
    if (!player || !player.getCurrentTime) return;
    try {
      const t = player.getCurrentTime();
      const endSec = clips[currentIndex].end || 0;
      if (endSec > 0 && t >= endSec - 0.3) {
        nextClip();
      }
    } catch(e) {}
  }

  function onPlayerStateChange(e) {
    if (e.data === YT.PlayerState.ENDED) {
      nextClip();
    } else if (e.data === YT.PlayerState.PLAYING) {
      document.getElementById('pauseBtn').textContent = '⏸ 一時停止';
    } else if (e.data === YT.PlayerState.PAUSED) {
      document.getElementById('pauseBtn').textContent = '▶ 再生';
    }
  }

  function nextClip() {
    if (checkInterval) clearInterval(checkInterval);
    let next = currentIndex + 1;
    while (next < clips.length && !parseYouTubeUrl(clips[next].url).videoId) {
      next++;
    }
    if (next < clips.length) {
      currentIndex = next;
      loadCurrentClip();
    } else {
      alert('全部再生し終わりました！お疲れさまでした 🎉');
      exitPlaying();
    }
  }

  function previousClip() {
    if (checkInterval) clearInterval(checkInterval);
    let prev = currentIndex - 1;
    while (prev >= 0 && !parseYouTubeUrl(clips[prev].url).videoId) {
      prev--;
    }
    if (prev >= 0) {
      currentIndex = prev;
      loadCurrentClip();
    }
  }

  function togglePause() {
    if (!player) return;
    const state = player.getPlayerState();
    if (state === 1) player.pauseVideo();
    else player.playVideo();
  }

  function exitPlaying() {
    if (checkInterval) clearInterval(checkInterval);
    if (player && player.stopVideo) player.stopVideo();
    document.getElementById('editMode').style.display = 'block';
    document.getElementById('playMode').style.display = 'none';
  }

  function copyShareUrl() {
    saveToHash();
    const url = location.href;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(
        () => alert('URLをコピーしました\n\nFire TVのブラウザに貼り付けてブックマークしてください'),
        () => prompt('このURLをコピーしてください:', url)
      );
    } else {
      prompt('このURLをコピーしてください:', url);
    }
  }

  // --- Init ---
  loadFromHash();
  renderClips();
</script>
</body>
</html>
